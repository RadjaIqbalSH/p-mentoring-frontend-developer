<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
</head>
<style>
  label {
    width: 200px;
    display: block;
  }
  input {
    margin-bottom: 12px;
  }
  span {
    display: block;
    margin: 0;
    padding: 0;
    color: red;
  }
</style>
<body>
  <a href="/sesi-13/product-list.html">Product List</a>
  <h1>List Cart</h1>
  <div id="cart">
    
  </div>
  <p id="total">Total : </p>
  <h1>Form Pengiriman</h1>
  <form iformd="form-pengiriman" onsubmit="handleSubmit(event)">
    <label for="name">Name</label>
    <input id="name" type="text">
    <span id="error-name"></span>
    <br>

    <label for="phone-number">Phone Number</label>
    <input id="phone-number" type="number">
    <span id="error-phone-number"></span>
    <br>

    <label for="email">Email</label>
    <input id="email" type="email">
    <span id="error-email"></span>
    <br>

    <label for="country">Country</label>
    <input id="country" type="text">
    <span id="error-country"></span>
    <br>

    <label for="city">City</label>
    <input id="city" type="text">
    <span id="error-city"></span>
    <br>

    <label for="pos-code">Pos Code</label>
    <input id="pos-code" type="number">
    <span id="error-pos-code"></span>
    <br>

    <label for="address">Address</label>
    <textarea id="address"></textarea>
    <span id="error-address"></span>
    <br>

    <button type="submit">Checkout</button>
  </form>

  <script>
    const products = []
    const cart = {}

    const elementListCart = document.getElementById("cart")
    const elementTotal = document.getElementById("total")

    function getDomById (id) {
      return document.getElementById(id)
    }

    function handleSubmit (event) {
      event.preventDefault();

      const isError = {
        name: false,
        phoneNumber: false,
        email: false,
        country: false,
        city: false,
        postCode: false,
        address: false,
      }

      const dataCheckout = {
        name: "",
        phoneNumber: "",
        email: "",
        country: "",
        city: "",
        postCode: "",
        address: "",
      }

      dataCheckout.name = event.target[0].value
      dataCheckout.phoneNumber = event.target[1].value
      dataCheckout.email = event.target[2].value
      dataCheckout.country = event.target[3].value
      dataCheckout.city = event.target[4].value
      dataCheckout.postCode = event.target[5].value
      dataCheckout.address = event.target[6].value

      if(dataCheckout.name) {
        if (dataCheckout.name.length <= 3) {
          getDomById("error-name").textContent = "Name must be more then 3 character";
          isError.name = true
        } else {
          getDomById("error-name").textContent = ""
          isError.name = false
        }
      } else {
        getDomById("error-name").textContent = "Name is required"
        isError.name = true
      }

      if(dataCheckout.phoneNumber) {
        getDomById("error-phone-number").textContent = ""
        isError.phoneNumber = false
      } else {
        getDomById("error-phone-number").textContent = "Phone number is required"
        isError.phoneNumber = true
      }

      if(dataCheckout.email) {
        getDomById("error-email").textContent = ""
        isError.email = false
      } else {
        getDomById("error-email").textContent = "Email is required"
        isError.email = true
      }

      if(dataCheckout.country) {
        getDomById("error-country").textContent = ""
        isError.country = false
      } else {
        getDomById("error-country").textContent = "Country is required"
        isError.country = true
      }

      if(dataCheckout.city) {
        getDomById("error-city").textContent = ""
        isError.city = false
      } else {
        getDomById("error-city").textContent = "City is required"
        isError.city = true
      }
      
      if(dataCheckout.postCode) {
        getDomById("error-pos-code").textContent = ""
        isError.postCode = false
      } else {
        getDomById("error-pos-code").textContent = "Pos code is required"
        isError.postCode = true
      }

      if(dataCheckout.address) {
        getDomById("error-address").textContent = ""
        isError.address = false
      } else {
        getDomById("error-address").textContent = "Address is required"
        isError.address = true
      }

      if (!isError.name && !isError.phoneNumber && !isError.email && !isError.country && !isError.city && !isError.postCode && !isError.address) {
        submit(dataCheckout)
      }
    }

    function submit(data) {
      const prevDataCheckout = JSON.parse(localStorage.getItem("checkout")) || {}

      const dataCheckout = {
        ...prevDataCheckout
      } 

      dataCheckout[Math.floor(Math.random() * 1000)] = {
        data: data,
        cart: cart,
      }

      localStorage.setItem('checkout', JSON.stringify(dataCheckout))
      localStorage.removeItem("cart")
      location.href = "/sesi-13/product-list.html"
    }

    document.addEventListener("DOMContentLoaded", () => {
      const rawStorageCart = localStorage.getItem("cart")
      const storageCart = JSON.parse(rawStorageCart);
      Object.assign(cart, storageCart)

      const rawStorageProducts = localStorage.getItem("products")
      const storageProducts = JSON.parse(rawStorageProducts);
      Object.assign(products, storageProducts)

      renderCart();
      renderTotal();
    });

    function findProduct(id) {
      const resultFind = products.find(function (item) {
        return item.id === id
      })

      return resultFind
    }

    function renderCart () {
      for (const key in cart) {
        const detailProduct = findProduct(cart[key].id)
        const elementCart = document.getElementById("cart-" + cart[key].id)
        if (elementCart) {
          elementCart.textContent = `- ${detailProduct.name} : qty = ${cart[key].qty} : Price = ${detailProduct.price} : Total = ${detailProduct.price * cart[key].qty}`
        } else {
          const cartElement = document.createElement("p");
          cartElement.id = "cart-" + cart[key].id
          cartElement.textContent = `- ${detailProduct.name} : qty = ${cart[key].qty} : Price = ${detailProduct.price} : Total = ${detailProduct.price * cart[key].qty}`
          elementListCart.appendChild(cartElement)
        }
      }
    }

    function renderTotal() {

      let total = 0

      for (const key in cart) {
        const detailProduct = findProduct(cart[key].id)
        total = total + (cart[key].qty * detailProduct.price)
      }

      elementTotal.textContent = `Total : ${total}`
    }


  </script>
</body>

</html>
