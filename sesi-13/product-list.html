<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  .list-product {
    width: 100%;
    height: auto;
    padding: 12px;
    border: 2px solid black;
    box-sizing: border-box;
  }

  .list {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 12px;
  }

  .card-product {
    width: fit-content;
    height: auto;
    padding: 12px 24px;
    border: 1px solid salmon;
    margin: 0;
  }

  .button-add {
    margin-top: 12px;
    background-color: bisque;
  }

  .stock-available {
    color: green
  }

  .stock-not-available {
    color: red
  }
</style>

<body>
  <div class="list-product">
    <h1>List Product</h1>
    <div id="list" class="list">

    </div>

  </div>
  <div class="list-product" style="margin-top: 20px;">
    <h1>List Keranjang</h1>
    <a href="/sesi-13/checkout.html">Checkout</a>
    <div id="list-keranjang" class="list">
    </div>
  </div>
  <div id="example">

  </div>

  <script>

    // const exampleText = [
    //   "Hallo World 1",
    //   "Hallo World 2",
    //   "Hallo World 3",
    //   "Hallo World 4",
    //   "Hallo World 5",
    //   "Hallo World 6",
    //   "Hallo World 7",
    //   "Hallo World 8",
    // ]

    // const elementExample = document.getElementById("example");

    // function handleLooping(value, index) {
    //   const newH1 = document.createElement("h1");
    //   newH1.textContent = value

    //   const newButton = document.createElement("button");
    //   newButton.textContent = "Click Me"

    //   newButton.addEventListener("click", function () {
    //     console.log(value)
    //   })

    //   elementExample.appendChild(newH1)
    //   elementExample.appendChild(newButton)
    // }

    // exampleText.forEach(handleLooping)


    const products = [
      {
        id: 1,
        name: "Mouse Gaming 2",
        price: 300000,
        stock: 10,
      },
      {
        id: 2,
        name: "Monitor Gaming",
        price: 1300000,
        stock: 2,
      },
      {
        id: 3,
        name: "Keyboard Gaming",
        price: 450000,
        stock: 3,
      },
      {
        id: 4,
        name: "PC Gaming",
        price: 10000000,
        stock: 2,
      },
    ];

    const cart = {}

    const elementList = document.getElementById("list");
    const elementListKeranjang = document.getElementById("list-keranjang");

    document.addEventListener("DOMContentLoaded", () => {
      const rawStorageCart = localStorage.getItem("cart")
      const storageCart = JSON.parse(rawStorageCart);
      Object.assign(cart, storageCart)

      const rawStorageProducts = localStorage.getItem("products")
      const storageProducts = JSON.parse(rawStorageProducts);
      Object.assign(products, storageProducts)

      syncCart();
      loopingProducts();
    });

    function findProduct(id) {
      const resultFind = products.find(function (item) {
        return item.id === id
      })

      return resultFind
    }

    function syncCart() {
      for (const key in cart) {

        const detailProduct = findProduct(cart[key].id)

        const elementCart = document.getElementById("cart-" + cart[key].id)

        if (elementCart) {
          elementCart.textContent = `- ${detailProduct.name} : qty = ${cart[key].qty}`
        } else {
          const cartElement = document.createElement("p");
          cartElement.id = "cart-" + cart[key].id
          cartElement.textContent = `- ${detailProduct.name} : qty = ${cart[key].qty}`
          elementListKeranjang.appendChild(cartElement)
        }
      }
    }

    function loopingProducts() {
      elementList.innerHTML = ""
      products.forEach((value, index) => {

        const elementUl = document.createElement("ul");
        elementUl.className = "card-product"

        const elementName = document.createElement("li");
        elementName.textContent = `name: ${value.name}`;

        const elementPrice = document.createElement("li");
        elementPrice.textContent = `price: ${value.price}`;

        const elementStock = document.createElement("li");
        elementStock.textContent = `stock: ${value.stock}`

        if (value.stock < 1) {
          elementStock.style.color = "red"
        } else {
          elementStock.style.color = "green"
        }

        const elementButton = document.createElement("button");
        elementButton.textContent = "Add";
        elementButton.className = "button-add";

        if (value.stock < 1) {
          elementButton.disabled = "red"
        }

        elementButton.addEventListener("click", function () {

          products[index].stock -= 1;

          localStorage.setItem("products", JSON.stringify(products))

          elementStock.textContent = `stock: ${products[index].stock}`

          if (products[index].stock < 1) {
            elementStock.style.color = "red"
            elementButton.disabled = true
          } else {
            elementStock.style.color = "green"
          }

          // update cart list

          if (cart[value.id]) {
            cart[value.id].qty += 1
          } else {
            cart[value.id] = {
              id: value.id,
              qty: 1,
            }
          }

          localStorage.setItem("cart", JSON.stringify(cart))

          const elementCart = document.getElementById("cart-" + value.id)

          if (elementCart) {
            elementCart.textContent = `- ${value.name} : qty = ${cart[value.id].qty}`
          } else {
            const cartElement = document.createElement("p");
            cartElement.id = "cart-" + value.id
            cartElement.textContent = `- ${value.name} : qty = ${cart[value.id].qty}`
            elementListKeranjang.appendChild(cartElement)
          }
        })

        elementUl.appendChild(elementName)
        elementUl.appendChild(elementPrice)
        elementUl.appendChild(elementStock)
        elementUl.appendChild(elementButton)

        elementList.appendChild(elementUl)
      })
    }

    loopingProducts();
  </script>
</body>

</html>
