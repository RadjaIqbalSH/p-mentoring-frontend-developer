<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  .list-product {
    width: 100%;
    height: auto;
    padding: 12px;
    border: 2px solid black;
    box-sizing: border-box;
  }

  .list {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 12px;
  }

  .card-product {
    width: fit-content;
    height: auto;
    padding: 12px 24px;
    border: 1px solid salmon;
    margin: 0;
  }

  .button-add {
    margin-top: 12px;
    background-color: bisque;
  }
</style>

<body>
  <div class="list-product">
    <h1>List Product</h1>
    <div id="list" class="list">
    </div>
    <h1>
      <p></p>
    </h1>
  </div>
  <div class="list-product" style="margin-top: 20px;">
    <h1>List Keranjang</h1>
    <div id="list-keranjang" class="list">
    </div>
  </div>

  <script>

    const products = [
      {
        id: 1,
        name: "Mouse Gaming 2",
        price: 300000,
        stock: 10,
      },
      {
        id: 2,
        name: "Monitor Gaming",
        price: 1300000,
        stock: 2,
      },
      {
        id: 3,
        name: "Keyboard Gaming",
        price: 450000,
        stock: 3,
      },
      {
        id: 4,
        name: "PC Gaming",
        price: 10000000,
        stock: 2,
      },
    ];

    const cart = {}

    const elementList = document.querySelector("#list");
    const elementListKeranjang = document.querySelector("#list-keranjang");

    products.forEach((value, index) => {
      const elementUl = document.createElement("ul");
      elementUl.className = "card-product"

      const elementName = document.createElement("li");
      elementName.textContent = `name: ${value.name}`;

      const elementPrice = document.createElement("li");
      elementPrice.textContent = `price: ${value.price}`;

      const elementStock = document.createElement("li");
      elementStock.textContent = `stock: ${value.stock}`

      const elementButton = document.createElement("button");
      elementButton.textContent = "Add";
      elementButton.className = "button-add";

      elementButton.addEventListener("click", function () {
        products[index].stock = products[index].stock - 1

        if (cart[products[index].id]) {
          cart[products[index].id] += 1
        } else {
          cart[products[index].id] = 1
        }

        elementStock.textContent = `stock: ${value.stock}`

        const elementItemCart = document.getElementById("cart-" + products[index].id)

        if (elementItemCart) {
          elementItemCart.textContent = `- ${value.name} : qty = ${cart[products[index].id]}`
        } else {
          const cartElement = document.createElement("p");
          cartElement.id = "cart-" + products[index].id
          cartElement.textContent = `- ${value.name} : qty = ${cart[products[index].id]}`
          elementListKeranjang.appendChild(cartElement)
        }



      })

      elementUl.appendChild(elementName)
      elementUl.appendChild(elementPrice)
      elementUl.appendChild(elementStock)
      elementUl.appendChild(elementButton)

      console.log("elementUl => ", elementUl)
      elementList.appendChild(elementUl)
    })

    const example = 2;

    console.log(`count : ${example}`)

    // const cardList = products.map(function (value) {
    //   return `<ul class="card-product">
    //     <li>nama: ${value.name}</li>
    //     <li>price: ${value.price}</li>
    //     <li>stock: ${value.stock}</li>
    //   </ul>`
    // })

    // console.log("cardList => ", cardList.join(""))

    // elementList.innerHTML = cardList.join("")

  </script>
</body>

</html>
